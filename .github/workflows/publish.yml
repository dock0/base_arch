---
name: Publish
'on':
  push:
    branches:
    - main
jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - name: Run Docker CI
      uses: akerl/.github/actions/base-docker@main
    - name: Publish images
      run: ./meta/publish.sh
    - name: Post to hook-exporter
      uses: akerl/.github/actions/hook-exporter@main
      with:
        token: ${{ secrets.EXPORTER_TOKEN }}
        status: ${{ job.status }}
